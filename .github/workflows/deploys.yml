name: 🚀 Deploy to Hostinger via FTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4.1.0 # Updated action version

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4.0.2 # Updated action version
        with:
          node-version: '20' # Node.js version for the runner environment

      - name: 📦 Install Node Modules
        run: npm ci

      - name: 🎨 Build frontend CSS
        run: npm run build

      - name: 🚀 Deploy full project to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5 # Latest stable version, but be mindful of Node.js 24 deprecation for runners
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          local-dir: ./
          server-dir: /
          state-name: .ftp-deploy-sync-state.json
          dangerous-clean-slate: false
          security: loose 
          exclude: |
            **/.git/**
            **/.github/**
            **/node_modules/**
            **/vendor/** # Excluded as composer install will be run via SSH
            **/public/css/input.css
            **/.env # Excluded for security
            **/.env.example # Excluded for security
            **/package-lock.json
            **/composer.lock
            **/GEMINI.md
            **/plan.md
            **/test_db.php
            **/deploy.yml
