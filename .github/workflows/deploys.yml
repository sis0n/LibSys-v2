name: 🚀 Deploy to Hostinger via FTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Para sa Node.js 24 support

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # In-update sa latest stable Node.js

      - name: 📦 Install Node Modules
        run: npm ci

      - name: 🎨 Build frontend CSS
        run: npm run build

      - name: 🚀 Deploy full project to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21 # Ni-hardcode na natin sa 21 para iwas sa Secret error
          protocol: ftp
          local-dir: ./
          server-dir: public_html/
          dangerous-clean-slate: false
          exclude: |
            **/.git/**
            **/.github/**
            **/node_modules/**
            **/vendor/**
            **/public/css/input.css
            **/package-lock.json
            **/composer.lock
            **/GEMINI.md
            **/plan.md
            **/deploy.yml
